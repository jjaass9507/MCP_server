services:
  mcp-server:
    build: .
    image: mcp-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # config.toml must exist at this host path before running.
      # Copy from config.toml.example and edit it.
      - ./config.toml:/config/config.toml:ro
      # Persistent data directory for SQLite databases and files.
      - mcp-data:/data
    environment:
      MCP_LOG_LEVEL: INFO
      # Uncomment to write logs to a file inside the container:
      # MCP_LOG_FILE: /data/mcp_server.log

volumes:
  mcp-data:
